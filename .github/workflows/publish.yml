name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm install --no-audit --no-fund

      - run: npm run build

      - run: npx tsc --noEmit

      - run: npm publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
